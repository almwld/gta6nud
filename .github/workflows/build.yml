name: 🔥 Prometheus CI/CD - Clean Build

on:
  push:
    branches: [ "main" ]

jobs:
  build:
    name: 🚀 Build Android APK
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout Code
        uses: actions/checkout@v4

      - name: 💙 Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.22.0'
          channel: 'stable'

      - name: ☕ Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: 🧬 Create Placeholder Assets
        run: |
          echo "🔄 Creating placeholder assets..."
          mkdir -p assets/body/skins
          mkdir -p assets/body/models
          mkdir -p assets/body/animations
          mkdir -p assets/audio
          mkdir -p assets/icons
          mkdir -p assets/images
          mkdir -p assets/fonts
          
          touch assets/body/skins/default_skin.png
          touch assets/body/models/default_body.obj
          touch assets/body/animations/default_sprite.png
          
          touch assets/audio/heartbeat.mp3
          touch assets/audio/breathing.mp3
          touch assets/audio/ambient.mp3
          touch assets/audio/moan_low.mp3
          touch assets/audio/moan_high.mp3
          touch assets/audio/scream.mp3
          touch assets/audio/wet.mp3
          
          touch assets/icon-gta6hub.png
          
          echo "✅ Placeholder assets created"

      - name: 📦 Install Dependencies
        run: flutter pub get

      - name: 🛠️ Build Release APK
        run: flutter build apk --release

      - name: 📤 Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: gta6hub-release-apk
          path: build/app/outputs/flutter-apk/app-release.apk
